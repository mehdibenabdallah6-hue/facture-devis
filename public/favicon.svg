<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Photofacto brand favicon — orange tile with camera mark -->
  <rect width="64" height="64" rx="14" fill="#E8621A"/>
  <!-- Camera body -->
  <rect x="10" y="20" width="44" height="30" rx="5" fill="#FFFFFF"/>
  <!-- Viewfinder bump -->
  <rect x="22" y="14" width="20" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Lens outer -->
  <circle cx="32" cy="35" r="10" fill="#E8621A"/>
  <!-- Lens inner -->
  <circle cx="32" cy="35" r="5.5" fill="#FFFFFF"/>
  <!-- Lens highlight -->
  <circle cx="29" cy="32" r="1.6" fill="#E8621A" opacity="0.5"/>
  <!-- Flash -->
  <circle cx="46" cy="26" r="2" fill="#E8621A"/>
</svg>
