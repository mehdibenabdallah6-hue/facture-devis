<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <title>Photofacto — Devis, factures, signature et relances pour artisans</title>
    <meta name="description" content="Photofacto — Devis, factures, signature et relances pour artisans. Créez vos devis avec l'IA, faites-les signer en ligne, transformez-les en factures et relancez vos clients depuis votre téléphone." />
    <meta name="theme-color" content="#E8621A" />
    <link rel="canonical" href="https://photofacto.fr/" />

    <!-- Favicon stack — the real Photofacto brand mark lives in the PNG
         icons (orange hexagon "PF"), so we point every reference at those.
         The ?v= query string busts aggressive browser/SW favicon caches when
         the artwork changes — bump the version on every favicon edit.
         Note: no SVG link, because the PNG icons are the source of truth and
         a hand-coded SVG would drift from the brand mark. -->
    <link rel="icon" href="/favicon.ico?v=20260425b" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=20260425b" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png?v=20260425b" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=20260425b" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Photofacto" />

    <!-- Open Graph / social — use PNG; Facebook + LinkedIn previews don't
         render SVG og:images reliably. -->
    <meta property="og:title" content="Photofacto — Devis, factures, signature et relances pour artisans" />
    <meta property="og:description" content="Créez vos devis avec l'IA, faites-les signer en ligne, transformez-les en factures et relancez vos clients depuis votre téléphone." />
    <meta property="og:image" content="https://photofacto.fr/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Photofacto — Devis, signature mobile, facture et relance pour artisans" />
    <meta property="og:site_name" content="Photofacto" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://photofacto.fr/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Photofacto — Devis, factures, signature et relances pour artisans" />
    <meta name="twitter:description" content="Créez vos devis avec l'IA, faites-les signer en ligne, transformez-les en factures et relancez vos clients depuis votre téléphone." />
    <meta name="twitter:image" content="https://photofacto.fr/og-image.png" />

    <!-- Organization JSON-LD — helps Google associate the favicon and brand
         with the site, and surfaces the logo in rich results. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Photofacto",
      "url": "https://photofacto.fr/",
      "logo": "https://photofacto.fr/icons/icon-512.png",
      "description": "Devis, factures, signature en ligne et relances pour artisans. Créez vos devis avec l'IA, faites-les signer sur téléphone, transformez-les en factures et relancez vos clients.",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Photofacto",
      "url": "https://photofacto.fr/",
      "inLanguage": "fr-FR"
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
