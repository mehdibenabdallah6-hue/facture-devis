name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install
        run: npm ci

      - name: Lint / typecheck
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Build
        run: npm run build
